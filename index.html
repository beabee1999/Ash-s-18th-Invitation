<!DOCTYPE html>
<html>
<head>
  <title>18th Birthday Invite</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: black;
      overflow-x: hidden;
      font-family: sans-serif;
      color: white;
    }

    img {
      width: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* 🌊 BUBBLES (LIGHT + SPACED) */
    .bubble {
      position: fixed;
      bottom: -150px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;

      background: radial-gradient(circle at 30% 30%,
        rgba(255,255,255,0.95),
        rgba(200,235,255,0.6),
        rgba(170,220,255,0.25)
      );

      box-shadow:
        inset 0 0 25px rgba(255,255,255,0.9),
        inset -10px -10px 25px rgba(200,235,255,0.4),
        0 0 35px rgba(200,235,255,0.6);

      opacity: 0;
      filter: blur(0.25px);

      animation: rise linear infinite;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }
      10% {
        opacity: 0.95;
      }
      100% {
        transform: translateY(-1500px) translateX(120px) scale(1.4);
        opacity: 0;
      }
    }

    /* 🎵 MUSIC SCREEN */
    #musicScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #cfe9ff, #a7d8ff, #e3f4ff);
      position: relative;
      overflow: hidden;
      z-index: 1;
      font-family: 'Playfair Display', serif;
    }

    #musicScreen::before {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.15);
      z-index: 1;
    }

    .music-card {
      position: relative;
      z-index: 5;
      width: 90%;
      max-width: 760px;
      padding: 65px 35px;
      border-radius: 30px;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(30px);
      box-shadow:
        0 25px 70px rgba(0, 60, 120, 0.22),
        inset 0 0 25px rgba(255,255,255,0.7);
      text-align: center;
    }

    .music-card h2 {
      font-size: 48px;
      font-weight: 300;
      line-height: 1.25;
      color: #2a4f6e;
      margin-bottom: 55px;
    }

    .btn {
      display: block;
      width: 62%;
      min-width: 280px;
      margin: 26px auto;
      padding: 22px;
      border-radius: 14px;
      border: none;
      font-size: 34px;
      font-weight: 400;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Playfair Display', serif;

      background: linear-gradient(135deg, #7fc8ff, #a7d8ff);
      color: #0f3554;
      box-shadow:
        0 10px 25px rgba(0,120,200,0.3),
        inset 0 0 12px rgba(255,255,255,0.6);
    }

    .btn:hover {
      transform: scale(1.04);
    }

    /* 📸 CONTENT */
    #content {
      display: none;
      position: relative;
      z-index: 2;
    }

    /* ⏳ COUNTDOWN (BIG + APPEARS FROM SLIDE 3) */
    .countdown-wrap {
      position: sticky;
      top: 20px;
      display: flex;
      justify-content: center;
      z-index: 8;

      margin-top: -10px;
      margin-bottom: -220px;
      pointer-events: none;
    }

    .countdown {
      width: 84%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 34px 80px;

      padding: 40px 50px;
      border-radius: 32px;

      background: rgba(210,238,255,0.75);
      backdrop-filter: blur(24px);

      border: 1px solid rgba(255,255,255,0.55);

      box-shadow:
        0 15px 60px rgba(0,60,120,0.22),
        inset 0 0 25px rgba(255,255,255,0.45);

      font-family: 'Playfair Display', serif;
      text-align: center;
    }

    .box div {
      font-size: 70px;
      font-weight: 300;
      color: #1f4564;
    }

    .box small {
      display: block;
      margin-top: 10px;
      font-size: 24px;
      color: #2a4f6e;
    }

  </style>
</head>

<body>

<!-- 🎵 MUSIC -->
<div id="musicScreen">
  <div class="music-card">
    <h2>Would you like to play<br>background music?</h2>

    <button class="btn" onclick="start(true)">Yes, play music</button>
    <button class="btn" onclick="start(false)">No, thanks</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 📸 CONTENT -->
<div id="content">

  <!-- SLIDE 1 -->
  <img src="slide1.jpg">

  <!-- SLIDE 2 -->
  <img src="slide2.jpg">

  <!-- ⏳ STARTS HERE (SLIDE 3) -->
  <div class="countdown-wrap">
    <div class="countdown">
      <div class="box"><div id="days">0</div><small>Days</small></div>
      <div class="box"><div id="hours">0</div><small>Hours</small></div>
      <div class="box"><div id="minutes">0</div><small>Minutes</small></div>
      <div class="box"><div id="seconds">0</div><small>Seconds</small></div>
    </div>
  </div>

  <img src="slide3.jpg">
  <img src="slide4.jpg">
  <img src="slide5.jpg">
  <img src="slide6.jpg">

</div>

<script>
function start(playMusic) {
  document.getElementById("musicScreen").style.display = "none";
  document.getElementById("content").style.display = "block";

  if (playMusic) {
    let audio = document.getElementById("music");
    audio.volume = 0.6;
    audio.play().catch(()=>{});
  }
}

// COUNTDOWN
var eventDate = new Date("June 17, 2026 19:00:00").getTime();

setInterval(function () {
  var now = new Date().getTime();
  var distance = eventDate - now;

  document.getElementById("days").innerHTML =
    Math.floor(distance / (1000 * 60 * 60 * 24));

  document.getElementById("hours").innerHTML =
    Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("minutes").innerHTML =
    Math.floor((distance % (1000*60*60)) / (1000*60));

  document.getElementById("seconds").innerHTML =
    Math.floor((distance % (1000*60)) / 1000);
}, 1000);

// 🌊 BUBBLES (LESS CROWDED)
for (let i = 0; i < 42; i++) {
  let bubble = document.createElement("div");
  bubble.className = "bubble";

  let size = 35 + Math.random() * 115;

  bubble.style.width = size + "px";
  bubble.style.height = size + "px";

  bubble.style.left = Math.random() * 100 + "vw";

  bubble.style.animationDuration = (8 + Math.random() * 12) + "s";
  bubble.style.animationDelay = Math.random() * 14 + "s";

  document.body.appendChild(bubble);
}
</script>

</body>
</html>
