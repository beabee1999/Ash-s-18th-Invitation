<!DOCTYPE html>
<html>
<head>
  <title>18th Birthday Invite</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: black;
      overflow-x: hidden;
      font-family: sans-serif;
      color: white;
    }

    img {
      width: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    .bubble {
      position: fixed;
      bottom: -150px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;

      background: radial-gradient(circle at 30% 30%,
        rgba(255,255,255,0.95),
        rgba(200,235,255,0.6),
        rgba(170,220,255,0.25)
      );

      box-shadow:
        inset 0 0 25px rgba(255,255,255,0.9),
        inset -10px -10px 25px rgba(200,235,255,0.4),
        0 0 35px rgba(200,235,255,0.6);

      opacity: 0;
      filter: blur(0.25px);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-1500px) translateX(120px) scale(1.4);
        opacity: 0;
      }
    }

    #musicScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #cfe9ff, #a7d8ff, #e3f4ff);
      position: relative;
      overflow: hidden;
      z-index: 1;

      font-family: 'Playfair Display', serif;
    }

    #musicScreen::before {
      content: "";
      position: absolute;
      inset: 0;
      backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.15);
      z-index: 1;
    }

    .music-card {
      position: relative;
      z-index: 5;

      width: 85%;
      max-width: 360px;

      padding: 40px 25px;
      border-radius: 28px;

      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(30px);

      box-shadow:
        0 20px 60px rgba(0, 60, 120, 0.2),
        inset 0 0 25px rgba(255,255,255,0.6);

      text-align: center;
      animation: softPop 0.9s ease forwards;
    }

    .music-card h2 {
      font-size: 26px;
      font-weight: 300;
      line-height: 1.4;
      color: #2a4f6e;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      margin: 12px 0;

      border-radius: 14px;
      border: none;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;
      transition: all 0.3s ease;

      background: linear-gradient(135deg, #7fc8ff, #a7d8ff);
      color: #0f3554;

      box-shadow:
        0 10px 25px rgba(0, 120, 200, 0.3),
        inset 0 0 12px rgba(255,255,255,0.6);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    #content {
      display: none;
      position: relative;
      z-index: 2;
    }

    .slide {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide img {
      width: 100%;
    }

    .animated-slide {
      opacity: 0;
      transform: scale(0.92) translateY(45px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .animated-slide.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .countdown-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 4;
    }

    .countdown {
      width: 82%;
      max-width: 430px;

      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px 42px;

      padding: 34px 30px;
      border-radius: 34px;

      background: rgba(167, 216, 255, 0.28);
      backdrop-filter: blur(24px);

      border: 1px solid rgba(255,255,255,0.45);

      box-shadow:
        0 15px 60px rgba(0, 60, 120, 0.25),
        inset 0 0 25px rgba(255,255,255,0.35);

      font-family: 'Playfair Display', serif;

      opacity: 0;
      transform: scale(0.9) translateY(40px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .countdown.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .box {
      text-align: center;
    }

    .box div {
      font-size: 54px;
      font-weight: 600;

      text-shadow:
        0 0 12px rgba(200,235,255,0.7),
        0 0 25px rgba(170,220,255,0.5);
    }

    .box small {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    @keyframes softPop {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(25px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>

<body>

<div id="musicScreen">
  <div class="music-card">
    <h2>Would you like to play<br>background music?</h2>

    <button class="btn" onclick="start(true)">Yes, play music</button>
    <button class="btn" onclick="start(false)">No, thanks</button>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="content">

  <section class="slide">
    <img src="slide1.jpg">
  </section>

  <!-- Countdown first appears BETWEEN slide 1 and slide 2 -->
  <section class="countdown-section">
    <div class="countdown animated-item">
      <div class="box"><div id="days">0</div><small>Days</small></div>
      <div class="box"><div id="hours">0</div><small>Hours</small></div>
      <div class="box"><div id="minutes">0</div><small>Min</small></div>
      <div class="box"><div id="seconds">0</div><small>Sec</small></div>
    </div>
  </section>

  <section class="slide animated-slide">
    <img src="slide2.jpg">
  </section>

  <section class="slide animated-slide">
    <img src="slide3.jpg">
  </section>

  <section class="slide animated-slide">
    <img src="slide4.jpg">
  </section>

  <section class="slide animated-slide">
    <img src="slide5.jpg">
  </section>

  <section class="slide animated-slide">
    <img src="slide6.jpg">
  </section>

</div>

<script>
function start(playMusic) {
  document.getElementById("musicScreen").style.display = "none";
  document.getElementById("content").style.display = "block";

  if (playMusic) {
    let audio = document.getElementById("music");
    audio.volume = 0.6;
    audio.play().catch(()=>{});
  }
}

var eventDate = new Date("June 17, 2026 19:00:00").getTime();

setInterval(function () {
  var now = new Date().getTime();
  var distance = eventDate - now;

  document.getElementById("days").innerHTML =
    Math.floor(distance / (1000 * 60 * 60 * 24));

  document.getElementById("hours").innerHTML =
    Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("minutes").innerHTML =
    Math.floor((distance % (1000*60*60)) / (1000*60));

  document.getElementById("seconds").innerHTML =
    Math.floor((distance % (1000*60)) / 1000);
}, 1000);

// Slide/countdown pop animation when manually swiped into view
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    } else {
      entry.target.classList.remove("show");
    }
  });
}, {
  threshold: 0.35
});

document.querySelectorAll(".animated-slide, .countdown").forEach(item => {
  observer.observe(item);
});

// 🌊 SAME BUBBLES
for (let i = 0; i < 45; i++) {
  let bubble = document.createElement("div");
  bubble.className = "bubble";

  let size = 40 + Math.random() * 120;

  bubble.style.width = size + "px";
  bubble.style.height = size + "px";

  bubble.style.left = Math.random() * 100 + "vw";

  bubble.style.animationDuration = (8 + Math.random() * 12) + "s";
  bubble.style.animationDelay = Math.random() * 12 + "s";

  document.body.appendChild(bubble);
}
</script>

</body>
</html>
